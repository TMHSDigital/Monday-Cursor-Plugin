name: Validate Plugin Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.cursor-plugin/plugin.json'))"

      - name: Check directories exist
        run: |
          test -d skills
          test -d rules
          test -f assets/logo.png

      - name: Validate skill frontmatter
        run: |
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            skill_file="$dir/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL: Missing SKILL.md in $dir"
              exit 1
            fi
            if ! head -1 "$skill_file" | grep -q "^---"; then
              echo "FAIL: $skill_file missing YAML frontmatter"
              exit 1
            fi
            echo "OK: $skill_file"
          done

      - name: Validate rule frontmatter
        run: |
          for rule_file in rules/*.mdc; do
            if ! head -1 "$rule_file" | grep -q "^---"; then
              echo "FAIL: $rule_file missing YAML frontmatter"
              exit 1
            fi
            echo "OK: $rule_file"
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run structure tests
        run: pytest tests/ -v --tb=short

  validate-counts:
    name: Validate content counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check content counts match README
        run: |
          python3 << 'PYEOF'
          import os, sys

          errors = []

          skill_count = len([
              d for d in os.listdir('skills')
              if os.path.isdir(os.path.join('skills', d))
              and os.path.exists(os.path.join('skills', d, 'SKILL.md'))
          ])
          rule_count = len([
              f for f in os.listdir('rules')
              if f.endswith('.mdc')
          ])

          readme = open('README.md').read()
          if f'{skill_count} skills' not in readme:
              errors.append(f'README skill count mismatch (expected "{skill_count} skills")')
          if f'{rule_count} rules' not in readme:
              errors.append(f'README rule count mismatch (expected "{rule_count} rules")')

          if errors:
              for e in errors:
                  print(f'::error::{e}', file=sys.stderr)
              sys.exit(1)

          print(f'Counts verified: {skill_count} skills, {rule_count} rules')
          PYEOF
